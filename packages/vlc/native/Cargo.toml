[package]
name = "vlc_native"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
libc = "0.2"
libloading = "0.8"
napi = { version = "3", features = ["napi8"] }
napi-derive = "3"
once_cell = "1"

[target.'cfg(target_os = "macos")'.dependencies]
objc = "0.2"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
